<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CV Folder</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

<div class="container">
  <div class="folder" id="folder">
    <div class="cover" id="cover">
      <h1 id="name">Jane Doe</h1>
      <p id="title">Product Designer</p>
    </div>

    <div class="content" id="content"></div>
  </div>

  <div class="tabs">
    <button data-tab="experience">Experience</button>
    <button data-tab="education">Education</button>
    <button data-tab="languages">Languages</button>
    <button data-tab="skills">Skills</button>
    <button data-tab="projects">Projects</button>
  </div>
</div>

<script src="./assets/js/main.js"></script>
</body>
</html>
